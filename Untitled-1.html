<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShockClock</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
        text-align: center;
    }
    .card {
        background: white;
        padding: 20px;
        margin: auto;
        width: 400px;
        border-radius: 10px;
        box-shadow: 0 0 10px #ccc;
    }
    h1 {
        color: #333;
    }
    #clock {
        font-size: 28px;
        margin-bottom: 15px;
        color: #444;
        font-weight: bold;
    }
    .status {
        font-size: 22px;
        margin: 10px 0;
    }
    .active {
        color: red;
        font-weight: bold;
        animation: blink 1s linear infinite;
    }
    @keyframes blink {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }
    .safe {
        color: green;
        font-weight: bold;
    }
    button {
        padding: 12px 20px;
        font-size: 16px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin: 5px;
    }
    button:hover {
        background: #0056b3;
    }
    .disable-btn {
        background: red;
    }
    .disable-btn:hover {
        background: darkred;
    }
    .time-input {
        padding: 8px;
        font-size: 16px;
        width: 60px;
        margin: 0 5px;
        border: 2px solid #ddd;
        border-radius: 5px;
        text-align: center;
    }
    .alarm-time-display {
        background: #f0f0f0;
        padding: 10px;
        border-radius: 5px;
        margin: 15px 0;
        font-size: 18px;
    }
    .alarm-set {
        color: #ff6b00;
        font-weight: bold;
    }
    .info-row {
        display: flex;
        justify-content: space-between;
        padding: 5px 20px;
        margin: 5px 0;
        background: #f9f9f9;
        border-radius: 5px;
    }
</style>
</head>
<body>

<div class="card">
    <h1>ShockClock</h1>

    <!-- LIVE CLOCK -->
    <div id="clock">Loading time...</div>

    <div class="status" id="alarmStatus">Loading...</div>

    <!-- ALARM TIME DISPLAY -->
    <div class="alarm-time-display">
        <div id="alarmTimeStatus">No Alarm Set</div>
    </div>

    <!-- TIME INPUT -->
    <div style="margin: 20px 0;">
        <h3>Set Alarm Time:</h3>
        <input type="number" id="hours" class="time-input" min="0" max="23" placeholder="HH" value="12">
        <span>:</span>
        <input type="number" id="minutes" class="time-input" min="0" max="59" placeholder="MM" value="00">
        <span>:</span>
        <input type="number" id="seconds" class="time-input" min="0" max="59" placeholder="SS" value="00">
    </div>

    <button onclick="setAlarmTime()">Set Alarm</button>
    <button onclick="clearAlarm()">Clear Alarm</button>
    <button onclick="testAlarm()">Test Alarm Now</button>

    <!-- SYSTEM INFO -->
    <div style="margin-top: 20px;">
        <div class="info-row">
            <b>Light Level:</b> <span id="lightValue">--</span>
        </div>
        <div class="info-row">
            <b>Entered Code:</b> <span id="enteredCode">--</span>
        </div>
        <div class="info-row">
            <b>Correct Code:</b> <span id="correctCode">--</span>
        </div>
    </div>

    <button class="disable-btn" onclick="disableAlarm()">Disable Alarm</button>
</div>

<script>
const ARDUINO_IP = "http://192.168.1.45"; // CHANGE THIS TO YOUR ARDUINO IP

let alarmTime = null;
let alarmTriggered = false;

// LIVE CLOCK FUNCTION
function updateClock() {
    const now = new Date();
    const timeString = now.toLocaleTimeString();
    document.getElementById("clock").textContent = timeString;
    
    // Check if alarm should trigger
    checkAlarmTime(now);
}
setInterval(updateClock, 1000);
updateClock();

// CHECK IF CURRENT TIME MATCHES ALARM TIME
function checkAlarmTime(now) {
    if (!alarmTime || alarmTriggered) return;
    
    const currentHours = now.getHours();
    const currentMinutes = now.getMinutes();
    const currentSeconds = now.getSeconds();
    
    if (currentHours === alarmTime.hours && 
        currentMinutes === alarmTime.minutes && 
        currentSeconds === alarmTime.seconds) {
        triggerAlarm();
        alarmTriggered = true;
    }
}

// SET ALARM TIME
function setAlarmTime() {
    const hours = parseInt(document.getElementById("hours").value);
    const minutes = parseInt(document.getElementById("minutes").value);
    const seconds = parseInt(document.getElementById("seconds").value);
    
    if (isNaN(hours) || isNaN(minutes) || isNaN(seconds)) {
        alert("Please enter valid time values");
        return;
    }
    
    alarmTime = { hours, minutes, seconds };
    alarmTriggered = false;
    
    // Display the set alarm time
    const timeStr = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    document.getElementById("alarmTimeStatus").innerHTML = 
        `<span class="alarm-set">⏰ Alarm Set: ${timeStr}</span>`;
    
    // Send alarm time to Arduino (optional - for display on LCD)
    fetch(ARDUINO_IP + "/settime?h=" + hours + "&m=" + minutes + "&s=" + seconds)
        .catch(err => console.log("Error setting time on Arduino:", err));
}

// CLEAR ALARM
function clearAlarm() {
    alarmTime = null;
    alarmTriggered = false;
    document.getElementById("alarmTimeStatus").textContent = "No Alarm Set";
}

// TEST ALARM (TRIGGER IMMEDIATELY)
function testAlarm() {
    triggerAlarm();
}

// TRIGGER ALARM ON ARDUINO
function triggerAlarm() {
    fetch(ARDUINO_IP + "/trigger")
        .then(() => {
            updateStatus();
        })
        .catch(err => {
            console.log("Error triggering alarm:", err);
            alert("Could not connect to Arduino");
        });
}

// FETCH ALARM STATUS FROM ARDUINO
function updateStatus() {
    fetch(ARDUINO_IP + "/status")
        .then(res => res.json())
        .then(data => {
            document.getElementById("lightValue").textContent = data.light;
            document.getElementById("enteredCode").textContent = data.entered;
            document.getElementById("correctCode").textContent = data.correct;

            const status = document.getElementById("alarmStatus");
            if (data.alarmOn) {
                status.textContent = "🚨 ALARM ACTIVE 🚨";
                status.className = "status active";
            } else {
                status.textContent = "✅ System Safe";
                status.className = "status safe";
                // Reset alarm triggered flag when alarm is disabled
                if (alarmTriggered) {
                    alarmTriggered = false;
                }
            }
        })
        .catch(() => {
            document.getElementById("alarmStatus").textContent = "❌ Connection Error";
        });
}

// DISABLE ALARM
function disableAlarm() {
    fetch(ARDUINO_IP + "/disable")
        .then(() => updateStatus());
}

// Update status every second
setInterval(updateStatus, 1000);
updateStatus();
</script>

</body>
</html>
